name: Semgrep (Static Security Analysis)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "31 4 * * 1"

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Report-only: Findings werden im Log ausgegeben, der Build schlägt aber
      # nicht fehl. Nach Triage der bestehenden Findings kann --error ergänzt
      # werden, um den Job blockierend zu schalten.
      - name: Run Semgrep
        run: semgrep scan --config p/php --config p/security-audit --config p/owasp-top-ten
