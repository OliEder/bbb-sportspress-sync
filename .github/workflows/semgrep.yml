name: Semgrep (Static Security Analysis)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "31 4 * * 1"

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Blockierend: alle Findings zum Zeitpunkt der Einführung wurden triagiert
      # (Action-Tags gepinnt, Dependabot-Cooldown ergänzt, ein False-Positive
      # per nosemgrep-Kommentar begründet unterdrückt). Neue Findings lassen
      # den Build fehlschlagen.
      - name: Run Semgrep
        run: semgrep scan --config p/php --config p/security-audit --config p/owasp-top-ten --error
